version: "3.8"

services: 
  db:
    image: ankane/pgvector:latest
    container_name: pg-vlab-01
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [verbumlab-net]  
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: minio-vlab-01
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [verbumlab-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-vlab-init-01
    depends_on:
      minio:
        condition: service_healthy
    networks: [verbumlab-net]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-vlab-01:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/verbumlab &&
      echo 'MinIO bootstrap complete'
      "
    restart: on-failure  

  backend:
    build: ./backend
    container_name: backend-vlab-01
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_healthy
    networks: [verbumlab-net]

networks:
  verbumlab-net:
    driver: bridge

volumes:
  minio-data:
  db_data: